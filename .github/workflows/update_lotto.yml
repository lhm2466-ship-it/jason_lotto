name: Lotto Data Manual Update

on:
  workflow_dispatch: # GitHub Actions 탭에서 버튼을 눌러 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update Lotto Data
        run: node update_lotto.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lotto_data.json
          git commit -m "Manual update lotto_data.json [skip ci]" || echo "No changes to commit"
          git push
